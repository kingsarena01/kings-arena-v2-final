<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Arena Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
}

.header{
    background:#16284a;
    padding:20px;
    text-align:center;
}

.header h1{
    color:#00d8ff;
    margin:0;
}

.container{
    padding:20px;
}

.card{
    background:#16284a;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    color:#00d8ff;
    margin-top:0;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
<h1>👑 KING'S ARENA</h1>
<p>Admin Dashboard</p>
</div>

<div class="container">
<div class="card">
    <h2>🏆 Season 31</h2>

    <p><strong>Format:</strong> Group Stage + Knockout</p>
    <p><strong>Teams:</strong> 32</p>
    <p><strong>Groups:</strong> 8 (A–H)</p>
    <p><strong>Status:</strong> Registration</p>

    <button onclick="window.location.href='tournament.html'">
    Manage Tournament
    </button>
</div>
<div class="card">
<h2>👥 Players</h2>
<button onclick="window.location.href='players-admin.html'">
    Manage Players
</button>
</div>

<div class="card">
<h2>📅 Fixtures</h2>
<button onclick="window.location.href='fixture.html'">
    Manage Fixtures
</button>
</div>

<div class="card">
<h2>🏆 Standings</h2>
<button onclick="window.location.href='standings.html'">
    Manage Standings
</button>
</div>

<div class="card">
<h2>📊 Results</h2>
<button onclick="window.location.href='results.html'">
    Manage Results
</button>
</div>

</div>
<script type="module">
import { db } from "./firebase-config.js";

import {
  doc,
  getDoc
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

// နောက်တစ်ဆင့်မှာ ဆက်ရေးမယ်
   const snapshot = await getDoc(doc(db, "tournament", "current"));

if (snapshot.exists()) {
    const data = snapshot.data();

    document.querySelector(".card h2").innerHTML =
        "🏆 " + data.season;

    document.querySelectorAll(".card p")[0].innerHTML =
        "<strong>Format:</strong> Group Stage + Knockout";

    document.querySelectorAll(".card p")[1].innerHTML =
        "<strong>Teams:</strong> " + data.teams;

    document.querySelectorAll(".card p")[2].innerHTML =
        "<strong>Groups:</strong> " + data.groups + " (A–H)";

    document.querySelectorAll(".card p")[3].innerHTML =
        "<strong>Status:</strong> " + data.status;
    }
</script>
</body>
</html>
