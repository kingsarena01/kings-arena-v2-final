<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Arena Dashboard</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
}

.header{
    background:#16284a;
    padding:20px;
    text-align:center;
}

.header h1{
    color:#00d8ff;
    margin:0;
}

.container{
    padding:20px;
}

.card{
    background:#16284a;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    color:#00d8ff;
    margin-top:0;
}

button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
}
</style>

</head>

<body>

<div class="header">
<h1>👑 KING'S ARENA</h1>
<p>Admin Dashboard</p>
</div>

<div class="container">
<div class="card">
    <h2>🏆 Season 31</h2>

    <p><strong>Format:</strong> Group Stage + Knockout</p>
    <p><strong>Teams:</strong> 32</p>
    <p><strong>Groups:</strong> 8 (A–H)</p>
    <p><strong>Status:</strong> Registration</p>

    <button>Manage Tournament</button>
</div>
<div class="card">
<h2>👥 Players</h2>
<button onclick="window.location.href='players-admin.html'">
    Manage Players
</button>
</div>

<div class="card">
<h2>📅 Fixtures</h2>
<button>Manage Fixtures</button>
</div>

<div class="card">
<h2>🏆 Standings</h2>
<button>Manage Standings</button>
</div>

<div class="card">
<h2>📊 Results</h2>
<button>Manage Results</button>
</div>

</div>

</body>
</html>
