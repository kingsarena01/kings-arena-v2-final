<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players Manager</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
    padding:20px;
}
.box{
    max-width:500px;
    margin:auto;
}
h1{
    color:#00d8ff;
    text-align:center;
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
#playerList{
    margin-top:25px;
}
.player{
    background:#16284a;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}
    .player-photo{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
    }
    .delete-btn{
    background:#e53935;
    color:white;
}

.delete-btn:hover{
    background:#c62828;
}
    .edit-btn{
    background:#2196f3;
    color:white;
    margin-bottom:10px;
}

.edit-btn:hover{
    background:#1976d2;
}
</style>
</head>

<body>

<div class="box">

<h1>👥 Player Manager</h1>

<input id="playerName" placeholder="Player Name">
<input id="teamName" placeholder="Team Name">

<select id="season">
  <option value="Season 31">Season 31</option>
</select>

<select id="group">
  <option>A</option>
  <option>B</option>
  <option>C</option>
  <option>D</option>
  <option>E</option>
  <option>F</option>
  <option>G</option>
  <option>H</option>
</select>

<input id="telegram" placeholder="Telegram Username">
<input type="file" id="photo" accept="image/*">
<label>Team Logo</label>
<input type="file" id="teamLogo" accept="image/*">
<button onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>

</script>
<script type="module">
import { db } from "./firebase-config.js";

import {
  collection,
  addDoc,
  getDocs,
  deleteDoc,
  updateDoc,
  doc
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
let editingPlayerId = null;
window.addPlayer = async function () {

const player=document.getElementById("playerName").value;
const team = document.getElementById("teamName").value;
const season = document.getElementById("season").value;
const group = document.getElementById("group").value;
const telegram = document.getElementById("telegram").value;
    const file = document.getElementById("photo").files[0];
const logoFile = document.getElementById("teamLogo").files[0];
let photoUrl = "";
let teamLogoUrl = "";
if (file) {
  const formData = new FormData();
  formData.append("file", file);
  formData.append("upload_preset", "kings-arena-upload");

  const response = await fetch(
    "https://api.cloudinary.com/v1_1/fb58qrjc/image/upload",
    {
      method: "POST",
      body: formData,
    }
  );

  const result = await response.json();
    console.log(result);
// alert(JSON.stringify(result));
  photoUrl = result.secure_url;
    }
if (logoFile) {
    const formData = new FormData();
    formData.append("file", logoFile);
    formData.append("upload_preset", "kings-arena-upload");

    const response = await fetch(
        "https://api.cloudinary.com/v1_1/fb58qrjc/image/upload",
        {
            method: "POST",
            body: formData
        }
    );

    const result = await response.json();
    teamLogoUrl = result.secure_url;
}
if(player=="" || team==""){
alert("Fill all fields");
return;
}

if (editingPlayerId) {

  await updateDoc(doc(db, "players", editingPlayerId), {
    playerName: player,
    teamName: team,
    season: season,
    group: group,
    telegram: telegram,
    photoUrl: photoUrl || "",
teamLogoUrl: teamLogoUrl || ""
  });

  editingPlayerId = null;
  document.querySelector("button").innerText = "Add Player";

} else {

  await addDoc(collection(db, "players"), {
    playerName: player,
    teamName: team,
    season: season,
    group: group,
    telegram: telegram,
    photoUrl: photoUrl,
teamLogoUrl: teamLogoUrl
  });

      }

document.getElementById("playerName").value="";
document.getElementById("teamName").value="";
document.getElementById("telegram").value = "";
document.getElementById("photo").value = "";
document.getElementById("season").value = "Season 31";
document.getElementById("group").value = "A";
loadPlayers();


};


async function loadPlayers(){

const list=document.getElementById("playerList");
list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"players"));

querySnapshot.forEach((doc)=>{
const id = doc.id;
const data = doc.data();
    
    list.innerHTML += `
    <div class="player">
    ${data.photoUrl ? `<img src="${data.photoUrl}" class="player-photo">` : ""}
        <b>${data.playerName}</b><br>
        ⚽ ${data.teamName}<br>
        🏆 ${data.season}<br>
        🅰️ Group ${data.group}<br>
        💬 ${data.telegram}
        <br>

<button class="edit-btn" onclick="editPlayer('${id}')">
✏️ Edit
</button>

<button class="delete-btn" onclick="deletePlayer('${id}')">
🗑 Delete
</button>
    </div>
    `;
});

}
window.editPlayer = async function(id){

  editingPlayerId = id;

  const snapshot = await getDocs(collection(db,"players"));

  snapshot.forEach((docSnap)=>{
    if(docSnap.id===id){

      const data = docSnap.data();

      document.getElementById("playerName").value = data.playerName;
      document.getElementById("teamName").value = data.teamName;
      document.getElementById("season").value = data.season;
      document.getElementById("group").value = data.group;
      document.getElementById("telegram").value = data.telegram;

      document.querySelector("button").innerText = "Update Player";
    }
  });

    }   
window.deletePlayer = async function(id){

    if(!confirm("Delete this player?")) return;

    await deleteDoc(doc(db, "players", id));

    loadPlayers();

}
loadPlayers();
    </script>

</body>
  </html>
