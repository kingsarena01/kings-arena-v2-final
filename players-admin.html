<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players Manager</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
    padding:20px;
}
.box{
    max-width:500px;
    margin:auto;
}
h1{
    color:#00d8ff;
    text-align:center;
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
#playerList{
    margin-top:25px;
}
.player{
    background:#16284a;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}
</style>
</head>

<body>

<div class="box">

<h1>👥 Player Manager</h1>

<input id="playerName" placeholder="Player Name">
<input id="teamName" placeholder="Team Name">

<select id="season">
  <option value="Season 31">Season 31</option>
</select>

<select id="group">
  <option>A</option>
  <option>B</option>
  <option>C</option>
  <option>D</option>
  <option>E</option>
  <option>F</option>
  <option>G</option>
  <option>H</option>
</select>

<input id="telegram" placeholder="Telegram Username">

<button onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>

</script>
<script type="module">
import { db } from "./firebase-config.js";
import {
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
window.addPlayer = async function () {

const player=document.getElementById("playerName").value;
const team = document.getElementById("teamName").value;
const season = document.getElementById("season").value;
const group = document.getElementById("group").value;
const telegram = document.getElementById("telegram").value;
if(player=="" || team==""){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"players"),{
  playerName: player,
  teamName: team,
  season: season,
  group: group,
  telegram: telegram
});

document.getElementById("playerName").value="";
document.getElementById("teamName").value="";

loadPlayers();

};


async function loadPlayers(){

const list=document.getElementById("playerList");
list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"players"));

querySnapshot.forEach((doc)=>{

const data = doc.data();

list.innerHTML += `
<div class="player">
<b>${data.playerName || data.name}</b><br>
${data.teamName || data.team}
</div>
`;

});

}

loadPlayers();
    </script>

</body>
  </html>
