<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players Manager</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
    padding:20px;
}
.box{
    max-width:500px;
    margin:auto;
}
h1{
    color:#00d8ff;
    text-align:center;
}
input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}
button{
    width:100%;
    padding:15px;
    margin-top:10px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
    cursor:pointer;
}
#playerList{
    margin-top:25px;
}
.player{
    background:#16284a;
    padding:12px;
    border-radius:10px;
    margin-bottom:10px;
}
    .player-photo{
    width:80px;
    height:80px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
    }
</style>
</head>

<body>

<div class="box">

<h1>👥 Player Manager</h1>

<input id="playerName" placeholder="Player Name">
<input id="teamName" placeholder="Team Name">

<select id="season">
  <option value="Season 31">Season 31</option>
</select>

<select id="group">
  <option>A</option>
  <option>B</option>
  <option>C</option>
  <option>D</option>
  <option>E</option>
  <option>F</option>
  <option>G</option>
  <option>H</option>
</select>

<input id="telegram" placeholder="Telegram Username">
<input type="file" id="photo" accept="image/*">
<button onclick="addPlayer()">Add Player</button>

<div id="playerList"></div>

</div>

</script>
<script type="module">
import { db, app } from "./firebase-config.js";
import {
  getStorage,
  ref,
  uploadBytes,
  getDownloadURL
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-storage.js";
import {
collection,
addDoc,
getDocs
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
const storage = getStorage(app);
window.addPlayer = async function () {

const player=document.getElementById("playerName").value;
const team = document.getElementById("teamName").value;
const season = document.getElementById("season").value;
const group = document.getElementById("group").value;
const telegram = document.getElementById("telegram").value;
    const file = document.getElementById("photo").files[0];

let photoUrl = "";

if (file) {
  const storageRef = ref(storage, "players/" + Date.now() + "_" + file.name);
  await uploadBytes(storageRef, file);
  photoUrl = await getDownloadURL(storageRef);
    }
if(player=="" || team==""){
alert("Fill all fields");
return;
}

await addDoc(collection(db,"players"),{
    playerName: player,
    teamName: team,
    season: season,
    group: group,
    telegram: telegram,
    photoUrl: photoUrl
});

document.getElementById("playerName").value="";
document.getElementById("teamName").value="";

loadPlayers();

};


async function loadPlayers(){

const list=document.getElementById("playerList");
list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"players"));

querySnapshot.forEach((doc)=>{
    const data = doc.data();
    
    list.innerHTML += `
    <div class="player">
    ${data.photoUrl ? `<img src="${data.photoUrl}" class="player-photo">` : ""}
        <b>${data.playerName}</b><br>
        ⚽ ${data.teamName}<br>
        🏆 ${data.season}<br>
        🅰️ Group ${data.group}<br>
        💬 ${data.telegram}
    </div>
    `;
});

}

loadPlayers();
    </script>

</body>
  </html>
