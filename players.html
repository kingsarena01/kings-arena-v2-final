<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Players - King's Arena</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

</head>

<body>

<header class="header">
<div class="logo">
<i class="fa-solid fa-users"></i>
<h1>PLAYERS</h1>
</div>

<p class="subtitle">
King's Arena eFootball Tournament
</p>
</header>

<section class="hero">

<h2>Choose Group</h2>

<div class="card">

<div id="group-buttons" class="group-buttons">

<button data-group="A">Group A</button>
<button data-group="B">Group B</button>
<button data-group="C">Group C</button>
<button data-group="D">Group D</button>

<button data-group="E">Group E</button>
<button data-group="F">Group F</button>
<button data-group="G">Group G</button>
<button data-group="H">Group H</button>

</div>

<div id="players-list"></div>

</div>

<br>

<a href="index.html" class="join-btn">
<i class="fa-solid fa-house"></i>
Back Home
</a>

</div>

</section>

<nav class="bottom-nav">

<a href="index.html">
<i class="fa-solid fa-house"></i>
<span>Home</span>
</a>

<a href="players.html" class="active">
<i class="fa-solid fa-users"></i>
<span>Players</span>
</a>

<a href="fixtures.html">
<i class="fa-solid fa-calendar-days"></i>
<span>Fixtures</span>
</a>

<a href="standings.html">
<i class="fa-solid fa-chart-column"></i>
<span>Standings</span>
</a>

<a href="results.html">
<i class="fa-solid fa-futbol"></i>
<span>Results</span>
</a>

</nav>

<script type="module">

import { db } from "./firebase-config.js";

import {
collection,
getDocs
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

const list=document.getElementById("players-list");

list.innerHTML="";

const querySnapshot=await getDocs(collection(db,"players"));

if(querySnapshot.empty){

list.innerHTML="<li>No registered players yet.</li>";

}else{

querySnapshot.forEach((doc)=>{

const p=doc.data();

list.innerHTML+=`
<li>
<b>${p.playerName}</b><br>
🏆 ${p.teamName}<br>
📱 ${p.telegram}
<hr>
</li>
`;

});

}

</script>

</body>
</html>
