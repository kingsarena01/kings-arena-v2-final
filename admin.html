<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>King's Arena Admin</title>

<style>
body{
    margin:0;
    background:#08111f;
    font-family:Arial,sans-serif;
    color:white;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.box{
    width:90%;
    max-width:350px;
    background:#16284a;
    padding:25px;
    border-radius:20px;
    text-align:center;
    box-shadow:0 0 20px rgba(0,255,255,.2);
}

h1{
    color:#00d8ff;
    margin-bottom:5px;
}

p{
    color:#bfc8d8;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:14px;
    margin:10px 0;
    border:none;
    border-radius:10px;
    font-size:16px;
}

button{
    width:100%;
    padding:15px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
    border:none;
    border-radius:10px;
    cursor:pointer;
    margin-top:15px;
}

button:hover{
    background:#00bfe2;
}
</style>

</head>

<body>

<div class="box">

<h1>👑 KING'S ARENA</h1>

<p>Admin Login</p>

<input type="email" placeholder="Admin Email">

<input type="password" placeholder="Password">

<button>LOGIN</button>

</div>

</body>
  </html>
