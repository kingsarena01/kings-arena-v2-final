<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tournament Management</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#08111f;
    color:white;
}

.header{
    background:#16284a;
    padding:20px;
    text-align:center;
}

.header h1{
    color:#00d8ff;
    margin:0;
}

.container{
    padding:20px;
}

.card{
    background:#16284a;
    border-radius:15px;
    padding:20px;
    margin-bottom:20px;
}

.card h2{
    color:#00d8ff;
    margin-top:0;
}

input,
select{
    width:100%;
    padding:12px;
    margin-top:8px;
    margin-bottom:15px;
    border-radius:8px;
    border:none;
}

button{
    width:100%;
    padding:15px;
    border:none;
    border-radius:10px;
    background:#00d8ff;
    color:black;
    font-size:18px;
    font-weight:bold;
}

</style>

</head>

<body>

<div class="header">
<h1>🏆 Tournament</h1>
<p>Tournament Management</p>
</div>

<div class="container">

<div class="card">

<h2>Season Settings</h2>

<label>Tournament Name</label>
<input id="tournamentName" type="text" placeholder="King's Arena">

<label>Season</label>
<input id="season" type="text" placeholder="Season 31">

<label>Teams</label>
<input id="teams" type="number" value="32">

<label>Groups</label>
<input id="groups" type="number" value="8">

<label>Status</label>
<select id="status">
<option>Registration</option>
<option>Group Stage</option>
<option>Knockout</option>
<option>Finished</option>
</select>

<button id="saveTournament">Save Tournament</button>
</div>

</div>
<script type="module" src="https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js"></script>

<script type="module" src="https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js"></script>

<script type="module" src="firebase-config.js"></script>

<script type="module">
import { db } from "./firebase-config.js";

import {
    doc,
    setDoc,
    getDoc
} from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";
const tournamentName = document.getElementById("tournamentName");
const season = document.getElementById("season");
const teams = document.getElementById("teams");
const groups = document.getElementById("groups");
const status = document.getElementById("status");
const saveTournament = document.getElementById("saveTournament");
saveTournament.addEventListener("click", async () => {

await setDoc(doc(db, "tournament", "current"), {
    tournamentName: tournamentName.value,
    season: season.value,
    teams: Number(teams.value),
    groups: Number(groups.value),
    status: status.value
});
    alert("Tournament Saved Successfully!");

});

const snapshot = await getDoc(doc(db, "tournament", "current"));

if (snapshot.exists()) {
    const data = snapshot.data();

    tournamentName.value = data.tournamentName;
    season.value = data.season;
    teams.value = data.teams;
    groups.value = data.groups;
    status.value = data.status;
}

</script>

</body>
</html>
